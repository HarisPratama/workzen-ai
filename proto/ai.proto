syntax = "proto3";

package ai;

option go_package = "workzen-be/internal/grpc/ai";

service AIService {
  rpc AnalyzeCV(AnalyzeCVRequest) returns (CVAnalysisResponse);
  rpc MatchJob(MatchJobRequest) returns (JobMatchResponse);
}

message AnalyzeCVRequest {
  string cv_text = 1;
}

message CVAnalysisResponse {
  string summary = 1;
  string recommendation = 2;
  repeated string skills = 3;
  repeated string experience_highlights = 4;
  int32 fit_score = 5;
}

message MatchJobRequest {
  string cv_text = 1;
  string jd_text = 2;
}

message JobMatchResponse {
  int32 score = 1;
  repeated string matched_skills = 2;
  repeated string missing_skills = 3;
  string explanation = 4;
  string verdict = 5;
}
