name: Continuous Deployment

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha,format=long
          type=raw,value=latest

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          echo "=== Starting AI Service Deployment ==="

          cd ~/workzen-be-deploy

          # Login to GHCR
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # Pull latest image
          echo "=== Pulling latest AI image ==="
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          # Update AI env file
          echo "${{ secrets.AI_ENV_FILE }}" > .env.ai
          chmod 600 .env.ai

          # Restart only the AI container
          echo "=== Restarting AI container ==="
          docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate ai

          # Verify gRPC health
          echo "=== Verifying AI service ==="
          sleep 5
          docker compose -f docker-compose.prod.yml ps ai

          # Cleanup
          docker image prune -f --filter "until=24h"

          echo "=== AI Service Deployment Complete ==="

  notify:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Workzen AI Service Deploy Status

            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Message:
            ${{ github.event.head_commit.message }}

            Status: ${{ job.status }}
